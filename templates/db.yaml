{{- if .Values.db.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine
          envFrom:
            - configMapRef:
                name: db-config
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
            - name: dshm
              mountPath: /dev/shm
            {{- if .Values.temboardAgent.enabled }}
            - name: pg-run
              mountPath: /run/postgresql
            {{- end }}
          {{- if .Values.temboardAgent.enabled }}
          args: ["-c", "shared_preload_libraries=pg_stat_statements", "-c", "pg_stat_statements.track=all"]
          {{- end }}
        {{- if .Values.temboardAgent.enabled }}
        - name: temboard-agent
          image: {{ .Values.temboardAgent.image }}
          command: ["sh", "-c"]
          args:
            - |
              adduser --disabled-password --uid 70 --gecos "" postgres 2>/dev/null || true
              while [ ! -S /run/postgresql/.s.PGSQL.5432 ]; do sleep 2; done
              PGDATA=/var/lib/postgresql/data
              printf "%s\n%s\n%s\n%s\n%s\n%s\n%s\n" 1 "${PGDATA}" "$(date +%s)" 5432 /run/postgresql "*" "  5432001    196608" > ${PGDATA}/postmaster.pid
              PGPASSWORD={{ .Values.db.password }} psql -h /run/postgresql -U {{ .Values.db.user }} -d {{ .Values.db.dbName }} -c "
                DO \$\$ BEGIN
                  IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = '{{ .Values.temboardAgent.pgUser }}') THEN
                    CREATE ROLE {{ .Values.temboardAgent.pgUser }} LOGIN PASSWORD '{{ .Values.temboardAgent.pgPassword }}';
                    GRANT pg_monitor TO {{ .Values.temboardAgent.pgUser }};
                  END IF;
                END \$\$;
              " || true
              exec temboard-agent --config=/config/temboard-agent.conf
          ports:
            - containerPort: {{ .Values.temboardAgent.port }}
          resources:
            requests:
              memory: "64Mi"
            limits:
              memory: "256Mi"
          volumeMounts:
            - name: pg-run
              mountPath: /run/postgresql
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
            - name: temboard-agent-config
              mountPath: /config
        {{- end }}
      restartPolicy: Always
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: {{ .Values.db.shm.size | quote }}
      {{- if .Values.temboardAgent.enabled }}
      - name: pg-run
        emptyDir: {}
      - name: temboard-agent-config
        configMap:
            name: temboard-agent-config
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
{{- if .Values.temboardAgent.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: temboard-agent
spec:
  selector:
    app: postgres
  ports:
  - port: {{ .Values.temboardAgent.port }}
    targetPort: {{ .Values.temboardAgent.port }}
  {{- if .Values.temboardAgent.externalIP }}
  externalIPs:
  - {{ .Values.temboardAgent.externalIP }}
  {{- end }}
{{- end }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.db.storage }}
{{- end }}
